services:
  rushdb:
    image: rushdb/platform:latest
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - '${RUSHDB_PORT:-3000}:3000'
    environment:
      RUSHDB_PORT: 3000
      RUSHDB_SELF_HOSTED: 'true'
      RUSHDB_SERVE_STATIC: 'true'
      RUSHDB_LOGIN: ${RUSHDB_LOGIN:-admin}
      RUSHDB_PASSWORD: ${RUSHDB_PASSWORD:?set RUSHDB_PASSWORD}
      RUSHDB_AES_256_ENCRYPTION_KEY: ${RUSHDB_AES_256_ENCRYPTION_KEY:?set a 32-character key}
      RUSHDB_DASHBOARD_URL: ${RUSHDB_DASHBOARD_URL:?set public Jelastic URL}
      RUSHDB_BASE_URL: ${RUSHDB_BASE_URL:?set public Jelastic URL}
      NEO4J_URL: ${NEO4J_URL:?set external NEO4J_URL}
      NEO4J_USERNAME: ${NEO4J_USERNAME:?set NEO4J_USERNAME}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:?set NEO4J_PASSWORD}
      SQL_DB_TYPE: postgres
      SQL_DB_URL: postgresql://${POSTGRES_USER:-rushdb}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-rushdb}
      # The bundled postgres:16-alpine talks plaintext over the private Compose
      # network and is not built with SSL. RushDB only auto-disables SSL for
      # localhost hosts, not service names like "postgres" — so without this the
      # first migration fails with "The server does not support SSL connections"
      # and the container crash-loops.
      SQL_DB_SSL: ${SQL_DB_SSL:-false}
      RUSHDB_EMBEDDING_BASE_URL: ${RUSHDB_EMBEDDING_BASE_URL:-}
      RUSHDB_EMBEDDING_API_KEY: ${RUSHDB_EMBEDDING_API_KEY:-}
      RUSHDB_EMBEDDING_MODEL: ${RUSHDB_EMBEDDING_MODEL:-}
      RUSHDB_EMBEDDING_DIMENSIONS: ${RUSHDB_EMBEDDING_DIMENSIONS:-}
      RUSHDB_LLM_BASE_URL: ${RUSHDB_LLM_BASE_URL:-}
      RUSHDB_LLM_API_KEY: ${RUSHDB_LLM_API_KEY:-}
      RUSHDB_LLM_MODEL: ${RUSHDB_LLM_MODEL:-}
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-rushdb}
      POSTGRES_USER: ${POSTGRES_USER:-rushdb}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-rushdb}']
      interval: 5s
      retries: 30
      start_period: 10s
    restart: unless-stopped

volumes:
  postgres-data:
