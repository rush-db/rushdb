# RushDB — full self-hosted stack (RushDB + Neo4j + Postgres).
#
# This bundle runs everything in one command. It is the fastest way to get a
# working RushDB instance for evaluation, local use, or a small single-node
# deployment.
#
#   ./install.sh            # generates a hardened .env, then brings the stack up
#   # or, manually:
#   cp .env.full.example .env && docker compose -f compose.full.yaml up -d
#
# For production you usually want managed/external Neo4j (Aura) and Postgres
# instead of the bundled containers — use compose.yaml for that, or the Helm
# chart for Kubernetes. The defaults below let the stack start without an .env
# for evaluation; ALWAYS set strong secrets before exposing it to a network.
services:
  rushdb:
    image: rushdb/platform:${RUSHDB_IMAGE_TAG:-latest}
    depends_on:
      neo4j:
        condition: service_healthy
      postgres:
        condition: service_healthy
    ports:
      - '${RUSHDB_PORT:-3000}:3000'
    environment:
      RUSHDB_PORT: 3000
      RUSHDB_SELF_HOSTED: 'true'
      RUSHDB_SERVE_STATIC: 'true'
      RUSHDB_LOGIN: ${RUSHDB_LOGIN:-admin}
      RUSHDB_PASSWORD: ${RUSHDB_PASSWORD:-password}
      # Dev-only default key. Rotate before exposing the instance — exactly 32 chars.
      RUSHDB_AES_256_ENCRYPTION_KEY: ${RUSHDB_AES_256_ENCRYPTION_KEY:-32SymbolStringForTokenEncryption}
      RUSHDB_DASHBOARD_URL: ${RUSHDB_DASHBOARD_URL:-http://localhost:3000}
      RUSHDB_BASE_URL: ${RUSHDB_BASE_URL:-http://localhost:3000}
      # Bundled Neo4j (this Compose project). No external instance required.
      NEO4J_URL: bolt://neo4j:7687
      NEO4J_USERNAME: ${NEO4J_USERNAME:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-password}
      # Bundled Postgres for RushDB metadata (users, projects, tokens).
      SQL_DB_TYPE: postgres
      SQL_DB_URL: postgresql://${POSTGRES_USER:-rushdb}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-rushdb}
      # The bundled Postgres talks plaintext over the private Compose network.
      # (RushDB only auto-disables SSL for localhost hosts, not service names.)
      SQL_DB_SSL: ${SQL_DB_SSL:-false}
      # Optional OpenAI-compatible AI providers (vector search, relationship analysis).
      RUSHDB_EMBEDDING_BASE_URL: ${RUSHDB_EMBEDDING_BASE_URL:-}
      RUSHDB_EMBEDDING_API_KEY: ${RUSHDB_EMBEDDING_API_KEY:-}
      RUSHDB_EMBEDDING_MODEL: ${RUSHDB_EMBEDDING_MODEL:-}
      RUSHDB_EMBEDDING_DIMENSIONS: ${RUSHDB_EMBEDDING_DIMENSIONS:-}
      RUSHDB_LLM_BASE_URL: ${RUSHDB_LLM_BASE_URL:-}
      RUSHDB_LLM_API_KEY: ${RUSHDB_LLM_API_KEY:-}
      RUSHDB_LLM_MODEL: ${RUSHDB_LLM_MODEL:-}
    healthcheck:
      test: ['CMD-SHELL', 'wget --no-verbose --tries=1 --spider http://localhost:3000/health || exit 1']
      interval: 10s
      retries: 20
      start_period: 30s
    restart: unless-stopped

  neo4j:
    image: neo4j:${NEO4J_IMAGE_TAG:-2026.01.4}
    environment:
      NEO4J_ACCEPT_LICENSE_AGREEMENT: 'yes'
      NEO4J_AUTH: ${NEO4J_USERNAME:-neo4j}/${NEO4J_PASSWORD:-password}
      # Fetch APOC from the image at startup — required by RushDB. No local
      # plugin volume needed (unlike the development compose).
      NEO4J_PLUGINS: '["apoc"]'
      # Enable the Java Vector API for fast vector indexes.
      NEO4J_server_jvm_additional: '--add-modules jdk.incubator.vector'
    ports:
      - '${NEO4J_HTTP_PORT:-7474}:7474'
      - '${NEO4J_BOLT_PORT:-7687}:7687'
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
    healthcheck:
      test: ['CMD-SHELL', 'wget --no-verbose --tries=1 --spider localhost:7474 || exit 1']
      interval: 5s
      retries: 40
      start_period: 20s
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-rushdb}
      POSTGRES_USER: ${POSTGRES_USER:-rushdb}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-rushdb}']
      interval: 5s
      retries: 30
      start_period: 10s
    restart: unless-stopped

volumes:
  neo4j-data:
  neo4j-logs:
  postgres-data:
