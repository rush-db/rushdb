apiVersion: v1
kind: Service
metadata:
  name: {{ include "rushdb.fullname" . }}
  labels:
    {{- include "rushdb.labels" . | nindent 4 }}
spec:
  type: {{ .Values.rushdb.service.type }}
  ports:
    - port: {{ .Values.rushdb.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "rushdb.selectorLabels" . | nindent 4 }}
