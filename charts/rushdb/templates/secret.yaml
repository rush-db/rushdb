apiVersion: v1
kind: Secret
metadata:
  name: {{ include "rushdb.fullname" . }}
  labels:
    {{- include "rushdb.labels" . | nindent 4 }}
type: Opaque
stringData:
  RUSHDB_AES_256_ENCRYPTION_KEY: {{ required "rushdb.encryptionKey is required (must be exactly 32 characters)" .Values.rushdb.encryptionKey | quote }}
  RUSHDB_LOGIN: {{ .Values.rushdb.adminLogin | quote }}
  RUSHDB_PASSWORD: {{ .Values.rushdb.adminPassword | quote }}
  NEO4J_URL: {{ include "rushdb.neo4jUrl" . | quote }}
  NEO4J_USERNAME: {{ include "rushdb.neo4jUsername" . | quote }}
  NEO4J_PASSWORD: {{ include "rushdb.neo4jPassword" . | quote }}
  {{- if .Values.rushdb.sqlDbUrl }}
  SQL_DB_URL: {{ .Values.rushdb.sqlDbUrl | quote }}
  {{- end }}
  {{- if .Values.rushdb.jwtPrivateKeyBase64 }}
  RUSHDB_JWT_PRIVATE_KEY_BASE64: {{ .Values.rushdb.jwtPrivateKeyBase64 | quote }}
  {{- end }}
  {{- if .Values.rushdb.jwtPublicKeyBase64 }}
  RUSHDB_JWT_PUBLIC_KEY_BASE64: {{ .Values.rushdb.jwtPublicKeyBase64 | quote }}
  {{- end }}
  {{- if .Values.rushdb.embeddingApiKey }}
  RUSHDB_EMBEDDING_API_KEY: {{ .Values.rushdb.embeddingApiKey | quote }}
  {{- end }}
  {{- if .Values.rushdb.llmApiKey }}
  RUSHDB_LLM_API_KEY: {{ .Values.rushdb.llmApiKey | quote }}
  {{- end }}
{{- if .Values.neo4j.enabled }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "rushdb.neo4j.fullname" . }}
  labels:
    {{- include "rushdb.neo4j.labels" . | nindent 4 }}
type: Opaque
stringData:
  NEO4J_AUTH: {{ printf "neo4j/%s" .Values.neo4j.password | quote }}
{{- end }}
