apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "rushdb.fullname" . }}
  labels:
    {{- include "rushdb.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.rushdb.replicaCount }}
  selector:
    matchLabels:
      {{- include "rushdb.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        # Force pod restart when the secret changes
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- with .Values.rushdb.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "rushdb.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.rushdb.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.rushdb.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.rushdb.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.rushdb.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: rushdb
          image: "{{ .Values.rushdb.image.repository }}:{{ .Values.rushdb.image.tag }}"
          imagePullPolicy: {{ .Values.rushdb.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.rushdb.service.port }}
              protocol: TCP
          env:
            - name: RUSHDB_PORT
              value: {{ .Values.rushdb.service.port | quote }}
            - name: RUSHDB_SELF_HOSTED
              value: {{ .Values.rushdb.selfHosted | quote }}
            - name: RUSHDB_SERVE_STATIC
              value: {{ .Values.rushdb.serveStatic | quote }}
            - name: SQL_DB_TYPE
              value: {{ .Values.rushdb.sqlDbType | quote }}
            {{- if and (eq .Values.rushdb.sqlDbType "sqlite") .Values.rushdb.persistence.enabled }}
            - name: SQL_DB_PATH
              value: /data/rushdb.db
            {{- end }}
            {{- if .Values.rushdb.dashboardUrl }}
            - name: RUSHDB_DASHBOARD_URL
              value: {{ .Values.rushdb.dashboardUrl | quote }}
            {{- end }}
            {{- if .Values.rushdb.publicUrl }}
            - name: RUSHDB_PUBLIC_URL
              value: {{ .Values.rushdb.publicUrl | quote }}
            - name: RUSHDB_OAUTH_ISSUER
              value: {{ .Values.rushdb.publicUrl | quote }}
            {{- end }}
            {{- if or .Values.rushdb.baseUrl .Values.rushdb.publicUrl }}
            - name: RUSHDB_BASE_URL
              value: {{ default .Values.rushdb.publicUrl .Values.rushdb.baseUrl | quote }}
            {{- end }}
            {{- if .Values.rushdb.jwtKid }}
            - name: RUSHDB_JWT_KID
              value: {{ .Values.rushdb.jwtKid | quote }}
            {{- end }}
            {{- if .Values.rushdb.embeddingBaseUrl }}
            - name: RUSHDB_EMBEDDING_BASE_URL
              value: {{ .Values.rushdb.embeddingBaseUrl | quote }}
            {{- end }}
            {{- if .Values.rushdb.embeddingModel }}
            - name: RUSHDB_EMBEDDING_MODEL
              value: {{ .Values.rushdb.embeddingModel | quote }}
            {{- end }}
            {{- if .Values.rushdb.embeddingDimensions }}
            - name: RUSHDB_EMBEDDING_DIMENSIONS
              value: {{ .Values.rushdb.embeddingDimensions | quote }}
            {{- end }}
            {{- if .Values.rushdb.llmBaseUrl }}
            - name: RUSHDB_LLM_BASE_URL
              value: {{ .Values.rushdb.llmBaseUrl | quote }}
            {{- end }}
            {{- if .Values.rushdb.llmModel }}
            - name: RUSHDB_LLM_MODEL
              value: {{ .Values.rushdb.llmModel | quote }}
            {{- end }}
            {{- range $key, $val := .Values.rushdb.extraEnv }}
            - name: {{ $key }}
              value: {{ $val | quote }}
            {{- end }}
          envFrom:
            - secretRef:
                name: {{ include "rushdb.fullname" . }}
          {{- with .Values.rushdb.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.rushdb.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          {{- if and (eq .Values.rushdb.sqlDbType "sqlite") .Values.rushdb.persistence.enabled }}
          volumeMounts:
            - name: data
              mountPath: /data
          {{- end }}
      {{- if and (eq .Values.rushdb.sqlDbType "sqlite") .Values.rushdb.persistence.enabled }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "rushdb.fullname" . }}
      {{- end }}
